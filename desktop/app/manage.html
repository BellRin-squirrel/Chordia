<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>データベース管理 - Chordia</title>
    <link rel="icon" href="icon/Chordia.ico">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/manage/layout.css">
    <link rel="stylesheet" href="css/manage/table.css">
    <link rel="stylesheet" href="css/manage/player.css">
    <link rel="stylesheet" href="css/manage/modal.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
    <script src="js/theme_head.js"></script>
    <script>
        // Tauri v2 APIを使用して、新しいウィンドウで開かれたか（ラベルが manage_window か）を安全に判定する
        document.addEventListener('DOMContentLoaded', () => {
            const isWindowMode = window.__TAURI__ && window.__TAURI__.window && window.__TAURI__.window.getCurrentWindow().label === 'manage_window';
            if (isWindowMode || window.location.search.includes('mode=window')) {
                const backArea = document.querySelector('.header-left');
                if (backArea) backArea.style.display = 'none';
            }
        });
    </script>
</head>
<body>

    <div class="container-fluid">
        <header class="header form-header">
            <div class="header-left">
                <a href="index.html" class="back-link">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M10.5 19.5L3 12m0 0l7.5-7.5M3 12h18" />
                    </svg>
                    トップへ戻る
                </a>
            </div>
            
            <div class="header-center">
                <h1>データベース管理</h1>
                <p class="subtitle">楽曲情報の編集・削除・アートワークの管理</p>
            </div>

            <div class="header-right">
                <button id="btnToggleSelection" class="btn-secondary">楽曲を選択</button>
            </div>
        </header>

        <div class="manage-search-area">
            <div class="search-input-wrapper">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="search-icon">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-5.197-5.197m0 0A7.5 7.5 0 105.196 5.196a7.5 7.5 0 0010.607 10.607z" />
                </svg>
                <input type="text" id="searchInputManage" placeholder="タイトル、アーティスト、アルバム名で検索...">
            </div>
            <button id="btnSearchManage" class="btn-primary">検索</button>
            <button id="btnClearSearch" class="btn-secondary" style="display: none; padding: 12px 20px; color: #ef4444;">クリア</button>
            <button id="btnAdvancedSearch" class="btn-secondary" style="padding: 12px 20px;">高度な検索</button>
        </div>

        <main class="manage-container">
            <div class="table-wrapper">
                <table class="data-table" id="musicTable">
                    <thead>
                        <tr id="tableHeaderRow"></tr>
                    </thead>
                    <tbody id="tableBody"></tbody>
                </table>
            </div>
            <div id="paginationControl" class="pagination-container"></div>
        </main>

        <div id="bulkActionBar" class="bulk-action-bar">
            <div class="bulk-info">
                <span id="bulkCount">0</span> 曲選択中
            </div>
            <div class="bulk-buttons">
                <button id="btnBulkEdit" class="btn-bulk-edit">一括変更</button>
                <button id="btnBulkDelete" class="btn-bulk-delete">一括削除</button>
            </div>
        </div>
    </div>

    <div id="playerBar" class="player-bar">
        <div class="seek-wrapper">
            <input type="range" id="seekBar" class="seek-range" value="0" min="0" max="1000">
        </div>
        <div class="player-content">
            <div class="player-art-wrapper">
                <img id="playerArt" src="icon/Chordia.png" alt="Art">
            </div>
            <div class="player-info">
                <div class="info-row main">
                    <span id="playerTitle" class="p-title">Title</span>
                    <span class="p-divider">-</span>
                    <span id="playerArtist" class="p-artist">Artist</span>
                </div>
                <div class="info-row sub" id="playerSubInfo"></div>
            </div>
            <div class="player-controls">
                <span id="playerTimeDisplay" class="time-display">0:00 / 0:00</span>
                <button id="barPlayBtn" class="btn-bar-play">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 5.25v13.5m-7.5-13.5v13.5" />
                    </svg>
                </button>
            </div>
        </div>
    </div>

    <div id="artModal" class="modal-overlay">
        <div class="modal-content art-modal" style="width: 450px;">
            <button id="btnCloseArtModalX" class="btn-close-circle">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" /></svg>
            </button>
            <h3>アートワーク編集</h3>
            
            <div class="art-tabs-mini">
                <button class="art-mini-tab-btn active" data-target="art-mini-local">ローカル</button>
                <button class="art-mini-tab-btn" data-target="art-mini-video">動画URL</button>
                <button class="art-mini-tab-btn" data-target="art-mini-image">画像URL</button>
            </div>

            <div id="art-mini-local" class="art-mini-tab-content active">
                <button class="btn-select-art" style="width: 100%; margin-bottom: 12px;" onclick="document.getElementById('newArtInput').click()">PCから画像を選択</button>
            </div>

            <div id="art-mini-video" class="art-mini-tab-content">
                <div class="form-row" style="display: flex; flex-direction: column; gap: 8px;">
                    <input type="text" id="miniVideoUrl" class="bulk-input" placeholder="YouTubeなどの動画URLを入力...">
                    <button id="btnFetchVideoArt" class="btn-save" style="width: 100%;">サムネを取得</button>
                </div>
            </div>

            <div id="art-mini-image" class="art-mini-tab-content">
                <div class="form-row" style="display: flex; flex-direction: column; gap: 8px;">
                    <input type="text" id="miniImageUrl" class="bulk-input" placeholder="画像の直接URLを入力...">
                    <button id="btnFetchDirectArt" class="btn-save" style="width: 100%;">画像を取得</button>
                </div>
            </div>

            <p id="artErrorDisplay" class="art-error-msg" style="display: none;"></p>

            <div class="art-preview-area" style="margin-top: 20px;">
                <img id="currentArtPreview" src="icon/Chordia.png" alt="Preview">
                <p id="artStatusText">現在の画像</p>
            </div>
            
            <div style="display: flex; gap: 12px; margin-bottom: 20px;">
                <button class="btn-delete-art" id="btnExecRemoveArt" style="flex: 1;">画像を削除</button>
                <input type="file" id="newArtInput" accept="image/*" hidden>
            </div>

            <div class="modal-buttons">
                <button id="btnCancelArt" class="btn-cancel">キャンセル</button>
                <button id="btnSaveArt" class="btn-save">変更を適用</button>
            </div>
        </div>
    </div>

    <div id="lyricModal" class="modal-overlay">
        <div class="modal-content lyric-modal" style="width: 650px;">
            <button id="btnCloseLyricModalX" class="btn-close-circle">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" /></svg>
            </button>
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <h3 style="margin: 0;">歌詞編集</h3>
                <button type="button" id="btnAutoLyricManage" class="btn-auto-lyric">自動取得 (LRCLIB)</button>
            </div>
            <p id="lyricTargetTitle" style="font-size: 0.9rem; color: var(--text-sub); margin-bottom: 12px; font-weight: bold; text-align: left;"></p>
            <textarea id="lyricTextArea" placeholder="歌詞を入力..." style="height: 350px;"></textarea>
            <div class="modal-buttons">
                <button id="btnCancelLyric" class="btn-cancel">キャンセル</button>
                <button id="btnSaveLyric" class="btn-save">保存</button>
            </div>
        </div>
    </div>

    <div id="lyricSearchModalManage" class="modal-overlay" style="z-index: 2500;">
        <div class="modal-content lyric-modal" style="width: 500px;">
            <div id="lyricSearchListViewManage" class="modal-view">
                <h3>歌詞の検索結果</h3>
                <p style="font-size: 0.85rem; color: var(--text-sub); margin-bottom: 12px; text-align: left;">確認したい歌詞をクリックしてください。</p>
                <ul id="lyricResultListManage" class="lyric-result-list"></ul>
                <div class="modal-buttons" style="margin-top: 20px;">
                    <button type="button" id="btnCancelLyricSearchManage" class="btn-cancel" style="width: 100%;">閉じる</button>
                </div>
            </div>
            <div id="lyricSearchDetailViewManage" class="modal-view" style="display: none;">
                <h3>歌詞の確認</h3>
                <div id="lyricPreviewTextManage" class="lyric-preview"></div>
                <div class="modal-buttons" style="margin-top: 20px; display: flex; gap: 10px;">
                    <button type="button" id="btnBackToResultManage" class="btn-cancel" style="flex: 1;">一覧に戻る</button>
                    <button type="button" id="btnApplyLyricManage" class="btn-save" style="flex: 1;">適用</button>
                </div>
            </div>
        </div>
    </div>

    <!-- 一括変更モーダル -->
    <div id="bulkEditModal" class="modal-overlay">
        <div class="modal-content bulk-modal" style="width: 950px; max-height: 90vh; overflow-y: auto; position: relative;">
            <h3>選択した曲を一括変更</h3>
            
            <div class="bulk-main-layout" style="display: grid; grid-template-columns: 1.1fr 0.9fr; gap: 32px; text-align: left;">
                <!-- 左カラム: メタデータタグ一括入力 -->
                <div class="bulk-left-col">
                    <h4 style="border-bottom: 2px solid rgba(128,128,128,0.2); padding-bottom: 6px; margin-top: 0; margin-bottom: 16px; font-weight: 700;">メタデータの一括編集</h4>
                    <div id="bulkFormContainer" class="bulk-form-container" style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px;"></div>
                </div>
                
                <!-- 右カラム: アートワーク一括選択 & 歌詞一括追加 -->
                <div class="bulk-right-col" style="display: flex; flex-direction: column; gap: 24px;">
                    <!-- アートワーク一括編集 -->
                    <div class="bulk-art-section">
                        <h4 style="border-bottom: 2px solid rgba(128,128,128,0.2); padding-bottom: 6px; margin-top: 0; margin-bottom: 12px; font-weight: 700;">カバーアートの一括編集</h4>
                        
                        <!-- ★ 追加：維持と上書きの選択用ラジオ -->
                        <div class="source-selector" style="display: flex; gap: 16px; margin-bottom: 16px;">
                            <label class="radio-label" style="display: flex; align-items: center; gap: 6px; cursor: pointer; font-size: 0.9rem; font-weight: bold; color: var(--text-main);">
                                <input type="radio" name="bulkArtMode" value="keep" checked style="accent-color: var(--primary-color);">
                                <span>設定を維持する（そのまま変更しない）</span>
                            </label>
                            <label class="radio-label" style="display: flex; align-items: center; gap: 6px; cursor: pointer; font-size: 0.9rem; font-weight: bold; color: var(--text-main);">
                                <input type="radio" name="bulkArtMode" value="overwrite" style="accent-color: var(--primary-color);">
                                <span>新しい画像で一括上書きする</span>
                            </label>
                        </div>
                        
                        <div class="art-tabs-mini" id="bulkEditArtTabsMini">
                            <button class="art-mini-tab-btn active" data-target="bulk-edit-art-mini-local">ローカル</button>
                            <button class="art-mini-tab-btn" data-target="bulk-edit-art-mini-video">動画URL</button>
                            <button class="art-mini-tab-btn" data-target="bulk-edit-art-mini-image">画像URL</button>
                        </div>

                        <div id="bulk-edit-art-mini-local" class="art-mini-tab-content active">
                            <button class="btn-select-art" style="width: 100%; margin-bottom: 8px;" onclick="document.getElementById('newBulkEditArtInput').click()">PCから画像を選択</button>
                        </div>

                        <div id="bulk-edit-art-mini-video" class="art-mini-tab-content">
                            <div class="form-row" style="display: flex; gap: 8px; margin-bottom: 8px;">
                                <input type="text" id="bulkEditMiniVideoUrl" class="bulk-input" placeholder="動画URLを入力..." style="flex: 1;">
                                <button id="btnFetchBulkEditVideoArt" class="btn-primary" style="padding: 6px 14px; font-size: 0.85rem; white-space: nowrap;">取得</button>
                            </div>
                        </div>

                        <div id="bulk-edit-art-mini-image" class="art-mini-tab-content">
                            <div class="form-row" style="display: flex; gap: 8px; margin-bottom: 8px;">
                                <input type="text" id="bulkEditMiniImageUrl" class="bulk-input" placeholder="画像の直接URLを入力..." style="flex: 1;">
                                <button id="btnFetchBulkEditDirectArt" class="btn-primary" style="padding: 6px 14px; font-size: 0.85rem; white-space: nowrap;">取得</button>
                            </div>
                        </div>

                        <p id="bulkEditArtErrorDisplay" class="art-error-msg" style="display: none;"></p>

                        <div class="art-preview-area" style="display: flex; align-items: center; gap: 16px; padding: 12px; border-radius: 12px; background: var(--bg-color); border: 1px solid rgba(128,128,128,0.1);">
                            <img id="currentBulkEditArtPreview" src="icon/Chordia.png" alt="Preview" style="width: 80px; height: 80px; object-fit: cover; border-radius: 8px;">
                            <div>
                                <p id="bulkEditArtStatusText" style="font-size: 0.85rem; font-weight: 700; margin: 0 0 8px 0; color: var(--text-sub);">現在の画像</p>
                                <button class="btn-delete-art" id="btnExecBulkEditRemoveArt" style="padding: 4px 10px; font-size: 0.8rem;">画像を削除</button>
                            </div>
                        </div>
                        <input type="file" id="newBulkEditArtInput" accept="image/*" hidden>
                    </div>

                    <!-- 歌詞一括編集 -->
                    <div class="bulk-lyric-section">
                        <h4 style="border-bottom: 2px solid rgba(128,128,128,0.2); padding-bottom: 6px; margin-top: 0; margin-bottom: 12px; font-weight: 700;">歌詞の一括編集</h4>
                        
                        <!-- ★ 追加：維持と上書きの選択用ラジオ (歌詞) -->
                        <div class="source-selector" style="display: flex; gap: 16px; margin-bottom: 12px;">
                            <label class="radio-label" style="display: flex; align-items: center; gap: 6px; cursor: pointer; font-size: 0.9rem; font-weight: bold; color: var(--text-main);">
                                <input type="radio" name="bulkLyricMode" value="keep" checked style="accent-color: var(--primary-color);">
                                <span>設定を維持する（そのまま変更しない）</span>
                            </label>
                            <label class="radio-label" style="display: flex; align-items: center; gap: 6px; cursor: pointer; font-size: 0.9rem; font-weight: bold; color: var(--text-main);">
                                <input type="radio" name="bulkLyricMode" value="overwrite" style="accent-color: var(--primary-color);">
                                <span>新しい歌詞で一括上書きする</span>
                            </label>
                        </div>
                        
                        <textarea id="bulkEditLyricTextArea" placeholder="歌詞を入力..." style="width: 100%; height: 120px; background: var(--bg-color); color: var(--text-main); border: 1px solid rgba(128,128,128,0.2); border-radius: 8px; padding: 8px; font-size: 0.9rem; resize: vertical; outline: none; box-sizing: border-box;"></textarea>
                    </div>
                </div>
            </div>

            <div class="modal-buttons" style="margin-top: 24px; border-top: 1px solid rgba(128,128,128,0.2); padding-top: 16px;">
                <button id="btnCancelBulkEdit" class="btn-cancel">キャンセル</button>
                <button id="btnExecBulkEdit" class="btn-save">変更を適用</button>
            </div>
        </div>
    </div>

    <div id="deleteModal" class="modal-overlay">
        <div class="modal-content" style="width: 400px; text-align: center;">
            <h3 style="color: #ef4444;">楽曲を削除</h3>
            <p style="color: var(--text-sub); margin-bottom: 12px;">以下の楽曲をライブラリとファイルから完全に削除しますか?</p>
            <p id="deleteTargetName" style="font-weight: 800; font-size: 1.1rem; margin-bottom: 24px;"></p>
            <div class="modal-buttons">
                <button id="btnCancelDelete" class="btn-cancel">キャンセル</button>
                <button id="btnExecDelete" class="btn-primary" style="background-color: #ef4444 !important;">削除する</button>
            </div>
        </div>
    </div>

    <div id="advancedSearchModal" class="modal-overlay">
        <div class="modal-content" style="width: 850px; max-height: 90vh;">
            <button class="btn-close-circle" id="btnCloseAdvSearchModal">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" /></svg>
            </button>
            <h3>高度な検索フィルター</h3>
            <div id="advSearchRootContainer" style="margin: 24px 0;"></div>
            <div class="modal-buttons" style="display: flex; gap: 12px;">
                <button id="btnApplyAdvSearch" class="btn-primary" style="flex: 2;">フィルターを設定</button>
                <button id="btnClearAdvSearch" class="btn-cancel" style="flex: 1;">条件をクリア</button>
            </div>
        </div>
    </div>

    <div id="loadingOverlay" class="loading-overlay" style="display: none;">
        <div class="spinner"></div>
        <p class="loading-text">データを処理中...</p>
        <p id="loadingDetail" style="margin-top: 8px; color: var(--text-sub); font-family: monospace; font-size: 0.85rem;"></p>
    </div>

    <div id="loadingOverlaySimple" class="loading-overlay-simple" style="display: none;">
        <div class="spinner-simple"></div>
    </div>

    <div id="toast" class="toast"></div>
    <audio id="previewPlayer"></audio>

    <script src="js/manage/globals.js"></script>
    <script src="js/manage/utils.js"></script>
    <script src="js/manage/player.js"></script>
    <!-- ★ 変更: 分割したファイルをmodal.jsの前に配置 -->
    <script src="js/manage/modal_advanced.js"></script>
    <script src="js/manage/modal_bulk.js"></script>
    <script src="js/manage/modal.js"></script>
    <script src="js/manage/table.js"></script>
    <script src="js/manage/main.js"></script>
    <script src="js/theme.js"></script>
</body>
</html>
