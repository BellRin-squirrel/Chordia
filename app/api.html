<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>iPhone 同期認証</title>
    <link rel="icon" href="icon/Chordia.ico">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/api/api.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="js/theme_head.js"></script>
</head>
<body class="sync-body">
    <div class="container">
        <header class="header form-header">
            <h1>同期設定</h1>
        </header>

        <div class="card-large">
            <div id="viewMain">
                
                <!-- IPアドレスとポート番号の分離表示（最上部） -->
                <div class="connection-info-grid">
                    <div class="info-box">
                        <span class="info-label">IPアドレス</span>
                        <span class="info-value" id="displayIp">取得中...</span>
                    </div>
                    <div class="info-box">
                        <span class="info-label">ポート番号</span>
                        <span class="info-value" id="displayPort">----</span>
                    </div>
                </div>

                <hr class="separator">
                
                <!-- 認証コード（左）とQRコード表示エリア（右）の横並びレイアウト -->
                <div class="sync-interactive-grid">
                    
                    <!-- 左：認証コード＆プログレスバーパネル -->
                    <div class="interactive-panel code-panel">
                        <p class="panel-desc">以下の認証コードをiPhoneアプリに入力してください</p>
                        <div class="auth-code-large" id="authCodeDisplay">------</div>
                        <div class="countdown-container">
                            <div class="countdown-text">更新まであと <span id="codeTimer">30</span> 秒</div>
                            <div class="progress-bar-container">
                                <div id="codeProgressBar" class="progress-bar-fill"></div>
                            </div>
                        </div>
                    </div>

                    <!-- 右：QRコード表示エリア（右側、トグルボタン付き） -->
                    <div class="interactive-panel qr-panel">
                        <p class="panel-desc">または、カメラでQRコードを読み取ります</p>
                        <div class="qr-interactive-area">
                            <div id="qr-placeholder" class="qr-placeholder-btn-wrapper">
                                <button class="btn-primary" id="btnShowQr">QRコードを表示</button>
                            </div>
                            <div id="qr-wrapper" style="display:none;" class="qr-display-wrapper">
                                <div class="qr-bg-white">
                                    <div id="qrcode-container"></div>
                                </div>
                                <button class="btn-secondary btn-hide-qr" id="btnHideQr">QRコードを隠す</button>
                            </div>
                        </div>
                    </div>

                </div>
                
            </div>
        </div>

        <!-- 接続要求一覧 -->
        <div class="requests-container">
            <h2>接続リクエスト（許可待ち）</h2>
            <ul id="requestsList">
                <li class="no-sessions" id="noRequestsMsg">現在リクエストはありません</li>
            </ul>
        </div>

        <!-- 認証コード入力待ち一覧 -->
        <div class="requests-container">
            <h2>認証コード入力待ち</h2>
            <ul id="waitingCodeList">
                <li class="no-sessions" id="noWaitingCodeMsg">現在コード入力待ちの端末はありません</li>
            </ul>
        </div>

        <div class="sessions-container">
            <h2>接続済みのセッション（同期中）</h2>
            <ul id="sessionsList">
                <li class="no-sessions">接続中のデバイスはありません。</li>
            </ul>
        </div>
    </div>

    <!-- スタック型トースト用コンテナ -->
    <div id="toastContainer" class="toast-container"></div>
    
    <script src="js/api/api.js"></script>
    <script src="js/theme.js"></script>
</body>
</html>
