name: Build Chordia Dev Client (iOS Only) v4.0.0-beta3
on:
  workflow_dispatch: # 手動実行ボタン（入力パラメーターなしのシンプル起動）

jobs:
  build_ios:
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Expo
        uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: npm install

      - name: Give permission to prebuild
        run: chmod +x ./node_modules/.bin/expo

      # 対話プロンプトでのフリーズを防ぎ、常にクリーンな状態で事前ビルドを実行
      - name: Prebuild (Convert to Native Project)
        run: ./node_modules/.bin/expo prebuild --platform ios --clean --non-interactive

      # ★ 解決策: node_modules内のすべてのシェルスクリプトに実行権限を一括付与 (expo-constants等のPermission deniedを回避)
      - name: Give execute permission to all shell scripts in node_modules
        run: |
          find node_modules -type f -name "*.sh" -exec chmod +x {} \;

      # ★ 解決策: XcodeビルドがNodeを完全解決できるよう、ios/.xcode.env.local を自動生成
      - name: Configure Node for Xcode Build
        run: |
          NODE_PATH=$(which node)
          echo "export NODE_BINARY=$NODE_PATH" > ios/.xcode.env.local
          echo "Configured local xcode env with node path:"
          cat ios/.xcode.env.local

      - name: Build Unsigned IPA with Xcode
        run: echo "Began to build Unsigned IPA with Xcode"

      # 取得したプロジェクト名を $GITHUB_ENV に書き出し、ジョブ全体で共有
      - name: Get Workspace Name
        run: |
          PROJECT_NAME=$(ls ios | grep .xcworkspace | sed 's/\.xcworkspace//')
          echo "Found project: $PROJECT_NAME"
          echo "PROJECT_NAME=$PROJECT_NAME" >> $GITHUB_ENV

      # ★ 解決策: サンドボックス制限を無効化 (ENABLE_USER_SCRIPT_SANDBOXING=NO) しつつ、xcprettyでログを整形してアーカイブ作成
      - name: Make archive as for iPhones. (Unsigned)
        run: |
          set -o pipefail
          
          xcodebuild -workspace "./ios/$PROJECT_NAME.xcworkspace" \
            -scheme "$PROJECT_NAME" \
            -configuration Debug \
            -sdk iphoneos \
            -archivePath "./build/$PROJECT_NAME.xcarchive" \
            archive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            ENABLE_USER_SCRIPT_SANDBOXING=NO | xcpretty

      # ★ 変更: 出力ファイルを「ChordiaDev.ipa」として Payload フォルダから圧縮生成
      - name: Make Payload Folder and Make It IPA file
        run: |
          mkdir Payload
          cp -r "./build/$PROJECT_NAME.xcarchive/Products/Applications/$PROJECT_NAME.app" ./Payload/
          zip -r ChordiaDev.ipa Payload

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: Chordia-iOS-IPA
          path: ChordiaDev.ipa