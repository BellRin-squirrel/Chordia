name: Build iOS IPA for Sideloadly v4.0.0-beta2
on:
  workflow_dispatch: # 手動実行ボタンを有効化

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20

      - name: Setup Expo
        uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: npm install

      - name: Give permission to prebuild
        run: chmod +x ./node_modules/.bin/expo

      - name: Prebuild (Convert to Native Project)
        run: ./node_modules/.bin/expo prebuild --platform ios

      # XcodeビルドがNodeを完全解決できるように .xcode.env.local を強制生成
      - name: Configure Node for Xcode Build
        run: |
          NODE_PATH=$(which node)
          echo "export NODE_BINARY=$NODE_PATH" > ios/.xcode.env.local
          
          # 追加フェールセーフ: react-native内部の .xcode.env も強制的に上書き
          if [ -d "node_modules/react-native/scripts" ]; then
            echo "export NODE_BINARY=$NODE_PATH" > node_modules/react-native/scripts/.xcode.env.local
            
            # find-node.sh自体を、確実にパスを返すだけのスクリプトに上書き
            FIND_NODE_SCRIPT="node_modules/react-native/scripts/find-node.sh"
            echo "#!/bin/bash" > "$FIND_NODE_SCRIPT"
            echo "set -e" >> "$FIND_NODE_SCRIPT"
            echo "echo \"$NODE_PATH\"" >> "$FIND_NODE_SCRIPT"
            chmod +x "$FIND_NODE_SCRIPT"
          fi
          
          echo "Configured local xcode env with node path:"
          cat ios/.xcode.env.local

      - name: Build Unsigned IPA with Xcode
        run: echo "Began to build Unsigned IPA with Xcode"

      # 取得したプロジェクト名を $GITHUB_ENV に書き出し、ジョブ全体で共有
      - name: Get Workspace Name
        run: |
          PROJECT_NAME=$(ls ios | grep .xcworkspace | sed 's/\.xcworkspace//')
          echo "Found project: $PROJECT_NAME"
          echo "PROJECT_NAME=$PROJECT_NAME" >> $GITHUB_ENV

      # ★ 修正: xcpretty を一時的に外し、生のエラーログ（Generate Specsの失敗理由）を出力させます
      - name: Make archive as for iPhones. (Unsigned)
        run: |
          # 途中でエラーが起きてもGitHub Actionsに失敗を伝える
          set -o pipefail
          
          xcodebuild -workspace "./ios/$PROJECT_NAME.xcworkspace" \
            -scheme "$PROJECT_NAME" \
            -configuration Release \
            -sdk iphoneos \
            -archivePath "./build/$PROJECT_NAME.xcarchive" \
            archive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            ENABLE_USER_SCRIPT_SANDBOXING=NO

      - name: Make Payload Folder and Make It IPA file
        run: |
          # Payloadフォルダを作ってIPA化
          mkdir Payload
          cp -r "./build/$PROJECT_NAME.xcarchive/Products/Applications/$PROJECT_NAME.app" ./Payload/
          zip -r Chordia.ipa Payload

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: Chordia-IPA
          path: Chordia.ipa